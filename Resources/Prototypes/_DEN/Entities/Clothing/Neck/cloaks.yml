- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCloakColorable
  name: plain cloak
  description: A stylish single-color cloak. Doesn't make you any more important, but it's certainly attention-catching.
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Cloaks/colorable.rsi

- type: entity
  parent: [ClothingNeckBase, BaseFoldable]
  id: ClothingNeckCloakMantisDark
  name: dark mantis cloak
  description: "A billowing cloak that you can bundle around yourself, if you feel your traditional uniforms are too revealing. The brooch is a Greek psi."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_cloak_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Clothing
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_cloak_dark.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb-clothing-cloak
    unfoldVerbText: unfold-verb-clothing-cloak
  - type: FoldableClothing
    foldedEquippedPrefix: folded

- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingNeckCloakMantisDark
  id: ClothingNeckCloakMantisDarkFolded
  suffix: Bundled
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: folded

- type: entity
  parent: Clothing # It's not edible or butcherable!
  id: ClothingNeckCloakMantisShroud
  name: mantis wolfskin
  description: "A heavy traveler's cloak adorned with a charm-laden necklace, built to turn wind, rain, and dust alike. The origins of the name are lost to history, but the association with hunting remains."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_shroud.rsi
    state: icon
  - type: Item
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_shroud.rsi
    size: Small
  - type: Clothing
    quickEquip: true
    slots:
    - neck
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatMantisShroud
    requiredSlot:
    - neck
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
